name: macos

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # -------------------------
      # Install base tools
      # -------------------------
      - name: Install dependencies
        run: |
          brew update
          brew install cmake

      # -------------------------
      # Set Vulkan environment
      # -------------------------
      - name: Set Vulkan env
        run: |
          curl -L -O https://sdk.lunarg.com/sdk/download/1.4.341.1/mac/vulkansdk-macos-1.4.341.1.zip
          unzip vulkansdk-macos-1.4.341.1.zip
          sudo "$(pwd)/vulkansdk-macOS-1.4.341.1.app/Contents/MacOS/vulkansdk-macOS-1.4.341.1" \
            --root ~/VulkanSDK/1.4.341.1 \
            --accept-licenses --default-answer --confirm-command install com.lunarg.vulkan.core com.lunarg.vulkan.usr com.lunarg.vulkan.sdl2 com.lunarg.vulkan.glm com.lunarg.vulkan.volk com.lunarg.vulkan.vma com.lunarg.vulkan.ios
          cd ~/VulkanSDK/1.4.341.1 && ls -l


      # -------------------------
      # Verify Vulkan tools
      # -------------------------
      - name: Check Vulkan tools
        run: |
          echo "VULKAN_SDK=$VULKAN_SDK"
          which glslc || true
          glslc --version || true

      # -------------------------
      # Android SDK + NDK
      # -------------------------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;26.1.10909125"

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      # -------------------------
      # Environment setup
      # -------------------------
      - name: Set environment variables
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Build macos
        run: ./scripts/run.sh